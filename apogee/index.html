<!DOCTYPE html>
<html>
    <head>
        <style>
            #logo{
                width: 200px;
                padding-right: 20px;
                padding: 0;
                display: inline-block;
                position: inherit;
            }

            p{
                position: absolute;
                right: 8px;
                top: 0;
            }
        </style>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    </head>
    <body>
        <img src="https://calavera.xyz/imgs/zradl.svg" alt="Zenit Research And Development" id="logo">
        <p>Visualizador de relatórios.<br><span id="clock">.</span><br><a href="javascript:LoadReport()">Carregar Relatório</a></p>
        <hr>
        <div id="reportViewer" style="width:100%;height:100%;"></div>
    </body>

    <script>
        $(function(){
            UpdateClock();
            $("#reportViewer").innerHTML = FetchReport("reports/welcomeReport.txt");
        })

        function UpdateClock(){
            let date = new Date(); 
            let hh = date.getHours();
            let mm = date.getMinutes();
            let ss = date.getSeconds();

            hh = (hh < 10) ? "0" + hh : hh;
            mm = (mm < 10) ? "0" + mm : mm;
            ss = (ss < 10) ? "0" + ss : ss;

            let time = hh + ":" + mm + ":" + ss;
            document.getElementById("clock").innerHTML = time;

            setTimeout(() => {
                UpdateClock();
            }, 1000);
        }

        function LoadReport()
        {
            var promptResult = prompt("Por favor insira o relatório à ser carregado.");
            var file = `reports/${promptResult}.txt`;
            if(promptResult == null)
            {
                alert("Operação cancelada.");
                return;
            }

            if(!CanFetchReport(file))
            {
                alert("Relatório inexistente. Operação abortada.");
                return;
            }

            $("#reportViewer").innerHTML = FetchReport(file);
        }

        function CanFetchReport(file){
            var xhttp = new XMLHttpRequest();
            xhttp.open('HEAD', file, false);
            xhttp.send();
            return xhttp.status == 200;
        }

        function FetchReport(file){
            var xhttp = new XMLHttpRequest();
            xhttp.open("GET", file, false);
            xhttp.send();
            if(xhttp.status == 200)
                return xhttp.responseText.split('\n').join("<br>");
            return "Falha ao carregar relatório.";
        }
    </script>
</html>
