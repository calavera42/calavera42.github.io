<!DOCTYPE html>
<html>
    <head>
        <style>
            #logo{
                width: 15%;
                padding-right: 20px;
                display: inline;
            }
            #menu ul
            {
                list-style: none;
            }

            #menu ul li 
            {
                display: inline;
            }

            #menu ul li p
            {
                padding-left: 10px;
                padding-right: 10px;

                display: inline-block;
                text-decoration: none;
            }
            #menu ul li button
            {
                padding-left: 10px;
                padding-right: 10px;

                display: inline-block;
            }
        </style>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
        <script>
            function LoadReport()
            {
                var promptResult = prompt("Por favor insira o relatório à ser carregado.");
                var file = `reports/${promptResult}.txt`;
                if(promptResult == null)
                {
                    alert("Operação cancelada.");
                    return;
                }

                if(!CanFetchReport(file))
                {
                    alert("Relatório inexistente. Operação abortada.");
                    return;
                }

                $("#reportViewer").attr("src", file);
            }

            function CanFetchReport(file){
                var xhttp = new XMLHttpRequest();
                xhttp.open('HEAD', file, false);
                xhttp.send();
                return xhttp.status == 200;
            }
        </script>
    </head>
    <body>
        <nav id="menu">
            <ul>
                <li><img src="https://calavera.xyz/imgs/zradl.svg" alt="Zenit Research And Development" id="logo"></li>
                <li><p>Visualizador de relatórios.</p></li>
                <li><button onclick="LoadReport()">Carregar Relatório</button></li>
            </ul>
            <hr>
        </nav>
        <embed src="reports/welcomeReport.txt" id="reportViewer">
    </body>
</html>
