		<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
		<script>
			$(function()
			{
				setTimeout(Clock(), 500);
			})
			$(function(){
				var prev;
				$("a").hover(
					function(){
						prev = $(this).text();
						$(this).text(`[ ${prev} ]`);
					},
					function(){
						$(this).text(`${prev}`);
				})
			})
			$(function(){
				var prev;
				$("h1").hover(
					function(){
						prev = $(this).text();
						$(this).text(`[ ${prev} ]`);
					},
					function(){
						$(this).text(`${prev}`);
				})
			})
			function Clock()
			{
				var today = new Date();
  				var h = today.getHours();
  				var m = today.getMinutes();
  				var s = today.getSeconds();
				h = checkTime(h);
  				m = checkTime(m);
  				s = checkTime(s);
  				$("#clock").text(h + ":" + m + ":" + s);
			}
			function checkTime(i) {
  				if (i < 10) {i = "0" + i};  // add zero in front of numbers < 10
  				return i;
			}
		</script>
